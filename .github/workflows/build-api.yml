name: build-api

# main에 api 변경이 push되면: 테스트 → 이미지 빌드/ECR push → gitops 태그 갱신 커밋.
# ArgoCD가 그 커밋을 보고 배포한다.
on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"

# 동시 실행 방지. 앞선 실행이 gitops를 갱신하는 중에 겹치지 않게 한다.
concurrency:
  group: build-api
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC 토큰 발급(AWS assume-role)
  contents: write   # gitops 태그 갱신 커밋 push

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: docflow-api
  ROLE_ARN: arn:aws:iam::676591241328:role/github-actions-docflow

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test (ruff + pytest)
        working-directory: apps/api
        env:
          DATABASE_URL: ""
        run: |
          pip install -r requirements-dev.txt
          ruff check .
          pytest -q

      - name: Debug OIDC claims (임시)
        run: |
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | python3 -c "import sys,json;print(json.load(sys.stdin)['value'])")
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          # base64url 패딩 보정 후 디코드
          PAD=$(( (4 - ${#PAYLOAD} % 4) % 4 ))
          PAYLOAD="$PAYLOAD$(printf '=%.0s' $(seq 1 $PAD))"
          echo "$PAYLOAD" | tr '_-' '/+' | base64 -d 2>/dev/null | python3 -c "import sys,json;d=json.load(sys.stdin);print('sub=',repr(d.get('sub')));print('aud=',repr(d.get('aud')));print('iss=',repr(d.get('iss')))"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag (7-char SHA)
        id: vars
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          platforms: linux/amd64
          push: true
          # ECR은 IMMUTABLE. 같은 SHA 재push는 실패하며 그게 정상 동작이다.
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.sha }}

      - name: Update gitops image tag
        run: |
          sed -i "s|newTag: .*|newTag: ${{ steps.vars.outputs.sha }}|" \
            gitops/environments/dev/api/kustomization.yaml

      - name: Commit & push tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/environments/dev/api/kustomization.yaml
          # 변경이 없으면(같은 SHA) 커밋을 건너뛴다.
          if git diff --cached --quiet; then
            echo "no tag change, skipping commit"
          else
            git commit -m "deploy: api ${{ steps.vars.outputs.sha }} [skip ci]"
            git push origin HEAD:main
          fi
