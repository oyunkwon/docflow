server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api 를 api 서비스로 프록시한다. prefix는 그대로 보존한다.
    # (앱이 /api 아래에서 서빙하고, 운영 ALB도 경로를 자르지 않으므로 로컬도 동일하게 맞춘다.)
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
